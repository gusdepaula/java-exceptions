spring.datasource.url=jdbc:mysql://localhost:3306/adopet?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678

# Flyway configuration - ignore validation errors for existing migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# JPA/Hibernate - atualizar schema automaticamente (apenas para DEV)
spring.jpa.hibernate.ddl-auto=update

